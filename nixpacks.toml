# Nixpacks config for Railway/Render deploy
# Build: install deps, next build
# Start: db:migrate, seed (admin+content), then next start

[phases.install]
# Ensure sharp has linux binaries (same as Vercel)
cmds = ["...", "npm install --no-save --omit=dev --os=linux --cpu=x64 --libc=glibc sharp"]

[phases.build]
cmds = ["...", "yarn build"]

[start]
# Run migrations, seed default admin + content, then start
cmd = "yarn deploy:prepare && yarn start"
