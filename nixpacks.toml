# Nixpacks config for Railway/Render deploy
# Node 20: from package.json engines.node or .nvmrc
# Required env vars: DATABASE_URL, PAYLOAD_SECRET, PAYLOAD_ADMIN_EMAIL, PAYLOAD_ADMIN_PASSWORD

[phases.install]
cmds = [
  "npm install -g corepack@0.24.1 && corepack enable",
  "yarn install"
]

[phases.build]
cmds = ["yarn build"]

[variables]
NODE_ENV = "production"

[start]
cmd = "yarn deploy:prepare && yarn start"
